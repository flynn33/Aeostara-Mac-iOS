name: Repository Integrity

on:
  pull_request:
  push:
    branches: [main, platform/macos, platform/ios]

jobs:
  branch-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify coordination branch has no implementation source
        if: github.ref_name == 'main'
        run: |
          set -euo pipefail
          if find . -type f \( -name '*.swift' -o -name '*.m' -o -name '*.mm' -o -name '*.xcodeproj' \) | grep -q .; then
            echo "Implementation source is not permitted on coordination main"
            exit 1
          fi
