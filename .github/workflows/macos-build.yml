name: macOS Build

on:
  push:
    branches: [platform/macos]
  pull_request:
    branches: [platform/macos]

jobs:
  macos-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
