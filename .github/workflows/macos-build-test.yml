# Copyright (c) 2026 James Daley. All Rights Reserved.

name: macOS Build & Test

on:
  push:
    branches: [platform/macos]
  pull_request:
    branches: [platform/macos]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test
