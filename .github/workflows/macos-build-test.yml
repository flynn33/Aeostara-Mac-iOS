name: macOS Build & Test

on:
  push:
    branches: [platform/macos]
  pull_request:
    branches: [platform/macos]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies via vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git /tmp/vcpkg
          /tmp/vcpkg/bootstrap-vcpkg.sh
          /tmp/vcpkg/vcpkg install nlohmann-json catch2

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_STANDARD=20 \
            -DBUILD_TESTING=ON \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -G Ninja

      - name: Build
        run: cmake --build build

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: CLI smoke tests
        run: |
          chmod +x tests/CLISmokeTests/smoke_test.sh
          tests/CLISmokeTests/smoke_test.sh build
