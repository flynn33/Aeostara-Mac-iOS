# Aeostara Version Tracking Agent
# Documents changes between versions, updates CHANGELOG.md and README.md, creates GitHub Release.
# Copyright (c) 2026 James Daley. All Rights Reserved.

name: Version Tracker

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  track-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog and update docs
        uses: actions/github-script@v7
        id: changelog
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');

            const newTag = context.ref.replace('refs/tags/', '');
            core.info(`Processing release: ${newTag}`);

            // Find previous tag
            let previousTag = '';
            try {
              const tags = execSync('git tag --sort=-version:refname', { encoding: 'utf8' })
                .trim().split('\n').filter(Boolean);
              const idx = tags.indexOf(newTag);
              if (idx >= 0 && idx + 1 < tags.length) {
                previousTag = tags[idx + 1];
              }
            } catch {
              core.info('Could not determine previous tag');
            }

            // Get commits since previous tag
            const range = previousTag ? `${previousTag}..${newTag}` : newTag;
            const logOutput = execSync(
              `git log ${range} --pretty=format:"%s|||%an" --no-merges`,
              { encoding: 'utf8' }
            ).trim();

            if (!logOutput) {
              core.info('No commits found for changelog');
              return;
            }

            const commits = logOutput.split('\n').filter(Boolean).map(line => {
              const [message, author] = line.split('|||');
              return { message, author };
            });

            // Group by conventional commit type
            const groups = {
              'Features': [],
              'Bug Fixes': [],
              'Performance': [],
              'Documentation': [],
              'Refactoring': [],
              'Tests': [],
              'CI/CD': [],
              'Other': []
            };

            const typeMap = {
              'feat': 'Features',
              'fix': 'Bug Fixes',
              'perf': 'Performance',
              'docs': 'Documentation',
              'refactor': 'Refactoring',
              'test': 'Tests',
              'ci': 'CI/CD',
              'chore': 'Other'
            };

            for (const { message } of commits) {
              const match = message.match(/^([a-z]+)(\(.+\))?!?:\s*(.+)/);
              if (match) {
                const type = typeMap[match[1]] || 'Other';
                const desc = match[3];
                groups[type].push(desc);
              } else {
                groups['Other'].push(message);
              }
            }

            // Build changelog section
            const today = new Date().toISOString().split('T')[0];
            let changelogSection = `## [${newTag.replace('v', '')}] - ${today}\n\n`;
            let releaseBody = '';

            for (const [group, items] of Object.entries(groups)) {
              if (items.length > 0) {
                changelogSection += `### ${group}\n\n`;
                releaseBody += `### ${group}\n\n`;
                for (const item of items) {
                  changelogSection += `- ${item}\n`;
                  releaseBody += `- ${item}\n`;
                }
                changelogSection += '\n';
                releaseBody += '\n';
              }
            }

            // Update CHANGELOG.md — prepend new section after header
            const changelogPath = 'CHANGELOG.md';
            let changelog = fs.readFileSync(changelogPath, 'utf8');
            const headerEnd = changelog.indexOf('\n## ');
            if (headerEnd > 0) {
              changelog = changelog.slice(0, headerEnd) + '\n' + changelogSection + changelog.slice(headerEnd);
            } else {
              changelog += '\n' + changelogSection;
            }
            fs.writeFileSync(changelogPath, changelog);

            // Update README.md version reference
            const readmePath = 'README.md';
            let readme = fs.readFileSync(readmePath, 'utf8');
            const version = newTag.replace('v', '');
            readme = readme.replace(
              /\*\*Self-Healing Configuration Platform\*\* - v[\d.]+/,
              `**Self-Healing Configuration Platform** - v${version}`
            );
            fs.writeFileSync(readmePath, readme);

            // Export for later steps
            core.setOutput('release_body', releaseBody);
            core.setOutput('version', version);
            core.setOutput('tag', newTag);

      - name: Commit documentation updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md README.md
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "docs: update changelog and readme for ${{ steps.changelog.outputs.tag }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        if: steps.changelog.outputs.tag != ''
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.changelog.outputs.tag }}',
              name: 'Aeostara ${{ steps.changelog.outputs.tag }}',
              body: `${{ steps.changelog.outputs.release_body }}`,
              draft: false,
              prerelease: false
            });
