# Aeostara AI Attribution Guard
# Blocks commits and pushes containing AI attribution markers.
# Configure as a required status check on main to enforce.
# Copyright (c) 2026 James Daley. All Rights Reserved.

name: AI Attribution Guard

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: ['**']

jobs:
  check-attribution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check commit messages for AI attribution
        id: check-commits
        run: |
          echo "=== Checking commit messages for AI attribution ==="
          FOUND=0

          # Patterns to detect in commit messages
          PATTERNS=(
            "Co-Authored-By:.*[Cc]laude"
            "Co-Authored-By:.*[Oo]pen[Aa][Ii]"
            "Co-Authored-By:.*[Cc]opilot"
            "Co-Authored-By:.*GPT"
            "Co-Authored-By:.*[Aa]nthropic"
            "Co-Authored-By:.*noreply@anthropic"
            "Generated by Claude"
            "Generated by GPT"
            "Generated by Copilot"
            "Generated by AI"
            "AI-generated"
            "AI assisted"
            "[Ww]ritten by AI"
            "Created with Claude"
            "Created with Copilot"
            "Anthropic"
          )

          # Determine commit range
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            # For push events, check the pushed commits
            RANGE="${{ github.event.before }}..${{ github.event.after }}"
            # Handle initial push (before is all zeros)
            if echo "${{ github.event.before }}" | grep -q "^0\{40\}$"; then
              RANGE="${{ github.event.after }}"
            fi
          fi

          # Get commit messages
          MESSAGES=$(git log "$RANGE" --pretty=format:"%H %s%n%b" 2>/dev/null || git log -1 --pretty=format:"%H %s%n%b")

          for PATTERN in "${PATTERNS[@]}"; do
            MATCHES=$(echo "$MESSAGES" | grep -iE "$PATTERN" || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::AI attribution found in commit message matching pattern: $PATTERN"
              echo "$MATCHES"
              FOUND=1
            fi
          done

          echo "commits_found=$FOUND" >> "$GITHUB_OUTPUT"

      - name: Check file contents for AI attribution
        id: check-files
        run: |
          echo "=== Checking file contents for AI attribution ==="
          FOUND=0

          # Patterns to detect in file diffs
          FILE_PATTERNS=(
            "Co-Authored-By:.*[Cc]laude"
            "Co-Authored-By:.*[Oo]pen[Aa][Ii]"
            "Co-Authored-By:.*[Cc]opilot"
            "Co-Authored-By:.*GPT"
            "Co-Authored-By:.*[Aa]nthropic"
            "Co-Authored-By:.*noreply@anthropic"
            "Generated by Claude"
            "Generated by GPT"
            "Generated by Copilot"
            "Generated by AI"
            "AI-generated"
            "[Ww]ritten by AI"
          )

          # Get changed files
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF_RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            DIFF_RANGE="${{ github.event.before }}..${{ github.event.after }}"
            if echo "${{ github.event.before }}" | grep -q "^0\{40\}$"; then
              # Initial push — check all files
              DIFF_RANGE=""
            fi
          fi

          if [ -n "$DIFF_RANGE" ]; then
            DIFF_CONTENT=$(git diff "$DIFF_RANGE" --unified=0 -- '*.h' '*.cpp' '*.hpp' '*.swift' '*.md' '*.json' '*.txt' '*.cmake' '*.ps1' '*.yml' '*.yaml' 2>/dev/null || true)
          else
            # For initial push, check staged content of all tracked files
            DIFF_CONTENT=$(git diff --no-index /dev/null . --unified=0 -- '*.h' '*.cpp' '*.hpp' '*.swift' '*.md' '*.json' '*.txt' '*.cmake' '*.ps1' '*.yml' '*.yaml' 2>/dev/null || true)
          fi

          for PATTERN in "${FILE_PATTERNS[@]}"; do
            MATCHES=$(echo "$DIFF_CONTENT" | grep -n "^\+" | grep -iE "$PATTERN" || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::AI attribution found in file contents matching pattern: $PATTERN"
              echo "$MATCHES" | head -20
              FOUND=1
            fi
          done

          echo "files_found=$FOUND" >> "$GITHUB_OUTPUT"

      - name: Fail if AI attribution detected
        if: steps.check-commits.outputs.commits_found == '1' || steps.check-files.outputs.files_found == '1'
        run: |
          echo "::error::AI attribution detected in this push/PR."
          echo ""
          echo "This repository requires that all code be attributed to human authors only."
          echo "Please remove any AI attribution markers (Co-Authored-By, Generated by, etc.)"
          echo "and resubmit."
          exit 1

      - name: Pass
        if: steps.check-commits.outputs.commits_found != '1' && steps.check-files.outputs.files_found != '1'
        run: echo "No AI attribution found. Check passed."
