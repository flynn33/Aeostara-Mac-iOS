name: iOS Build

on:
  push:
    branches: [platform/ios]
  pull_request:
    branches: [platform/ios]

jobs:
  ios-build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build supported package products
        run: swift build

      - name: Run tests
        run: swift test

      - name: Verify app shell sources are present
        run: test -f Sources/AeostaraApp/AeostaraApp.swift
