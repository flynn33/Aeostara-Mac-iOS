# Aeostara iOS Build & Test
# Proves the iOS app builds and tests pass on Apple hardware.
# Copyright (c) 2026 James Daley. All Rights Reserved.

name: iOS Build & Test

on:
  push:
    branches: [platform/ios]
  pull_request:
    branches: [platform/ios]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build app for simulator
        run: |
          xcodebuild build \
            -project Aeostara.xcodeproj \
            -scheme AeostaraApp \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests
        run: |
          xcodebuild test \
            -project Aeostara.xcodeproj \
            -scheme AeostaraTests \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
